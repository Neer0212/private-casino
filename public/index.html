<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private VIP Casino</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white; text-align: center; padding: 20px; margin: 0; overflow-x: hidden; }
        .table { background: radial-gradient(circle, #2E8B57 0%, #1a5c36 100%); padding: 30px; border-radius: 150px; width: 75%; max-width: 900px; margin: auto; border: 15px solid #4a3018; box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.8); position: relative; }
        button { padding: 10px 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 5px; border-radius: 5px; border: none; background-color: #f1c40f; color: #111; transition: 0.2s; }
        button:hover { background-color: #f39c12; transform: scale(1.05); }
        input { padding: 10px; font-size: 16px; margin: 5px; border-radius: 5px; border: none; }
        
        .card-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; min-height: 120px; }
        .card { width: 80px; height: 115px; background-color: white; border-radius: 8px; border: 1px solid #ccc; box-shadow: 2px 4px 8px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; position: relative; background-image: linear-gradient(135deg, #fff 0%, #f9f9f9 100%); }
        .red { color: #d63031; } .black { color: #2d3436; }
        .card::before { content: attr(data-value); position: absolute; top: 5px; left: 8px; font-size: 16px; }

        .chat-widget { background: rgba(0,0,0,0.9); border: 2px solid #55efc4; border-radius: 10px; padding: 15px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; position: fixed; bottom: 20px; right: 20px; width: 320px; }
        
        /* --- SOCIAL FEATURES CSS --- */
        .reaction-bar { display: none; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
        .reaction-btn { background: transparent; border: none; font-size: 24px; padding: 5px; margin: 0 5px; cursor: pointer; transition: 0.2s; }
        .reaction-btn:hover { transform: scale(1.3) translateY(-5px); }
        
        .tip-btn { background-color: #3498db; color: white; padding: 5px 10px; font-size: 12px; margin-top: 10px; border-radius: 3px; }
        .tip-btn:hover { background-color: #2980b9; }

        /* Floating Emoji Animation */
        .floating-emoji { position: absolute; font-size: 40px; pointer-events: none; z-index: 999; animation: floatUp 2.5s ease-out forwards; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-50px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-200px) scale(1); opacity: 0; }
        }

        @media (max-width: 768px) {
            .chat-widget { position: relative; bottom: auto; right: auto; width: 90%; margin: 20px auto; box-sizing: border-box;}
            .table { border-width: 5px; padding: 15px; border-radius: 50px; width: 95%; }
        }
    </style>
</head>
<body>

    <h1 style="color: #f1c40f; letter-spacing: 2px;">♠️ VIP BLACKJACK ♣️</h1>
    
    <div style="margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
        <a href="/roulette.html" style="color: #9b59b6; text-decoration: none; font-weight: bold; border: 1px solid #9b59b6; padding: 5px 15px; border-radius: 20px; font-size: 14px;">🎡 Play Roulette</a>
        <a href="/leaderboard.html" style="color: #55efc4; text-decoration: none; font-weight: bold; border: 1px solid #55efc4; padding: 5px 15px; border-radius: 20px; font-size: 14px;">🏆 Global Leaderboard</a>
    </div>
    
    <div class="table" id="gameTable">
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; display: inline-block;">
            <input type="text" id="usernameInput" placeholder="Enter Username">
            <input type="text" id="roomInput" placeholder="Table Name" style="width: 140px;">
            <input type="number" id="betInput" placeholder="Bet" style="width: 80px;">
            <button onclick="sitAtTable()">Join Table</button>
            <h2 id="status" style="font-size: 16px; color: #ccc; margin-top: 10px; margin-bottom: 0;">Not sitting at a table...</h2>
        </div>

        <h2 style="color: #55efc4; font-size: 28px; margin: 10px 0 5px 0;">Bank: ₹<span id="balanceDisplay">0</span></h2>
        
        <div class="reaction-bar" id="reactionBar" style="display: none;">
            <button class="reaction-btn" onclick="fireReaction('🔥')">🔥</button>
            <button class="reaction-btn" onclick="fireReaction('💸')">💸</button>
            <button class="reaction-btn" onclick="fireReaction('💀')">💀</button>
            <button class="reaction-btn" onclick="fireReaction('🎯')">🎯</button>
        </div>

        <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
        
        <div id="otherPlayers" style="display: flex; justify-content: space-around; flex-wrap: wrap; margin: 20px 0; min-height: 100px;"></div>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

        <h3 style="color: #ffcc00; letter-spacing: 1px;">THE DEALER</h3>
        <p id="dealerMessages" style="font-size: 16px; font-style: italic; color: #ccc;">Waiting for bets...</p>
        <div id="dealerCards" class="card-container"></div>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

        <h3 id="scoreDisplay" style="letter-spacing: 1px;">Your Score: 0</h3>
        <div id="playerCards" class="card-container"></div>
        
        <div id="actionButtons" style="display: none; margin-top: 15px;">
            <button onclick="hit()" style="background-color: #2ecc71; color: white;">HIT</button>
            <button onclick="stand()" style="background-color: #e74c3c; color: white;">STAND</button>
        </div>
        <h2 id="gameStatus" style="font-size: 32px; text-shadow: 2px 2px 4px #000; margin-top: 20px;"></h2>
    </div>

    <div id="chatWidget" class="chat-widget">
        <h4 style="color: #55efc4; margin-top: 0; margin-bottom: 10px; border-bottom: 1px solid #55efc4; padding-bottom: 5px;">🔴 <span id="chatRoomName">VIP Table</span> Chat</h4>
        <div id="chatHistory" style="height: 180px; overflow-y: auto; color: white; font-size: 14px; margin-bottom: 10px; font-family: monospace; display: flex; flex-direction: column; gap: 5px;"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="Talk trash here..." style="width: 75%; padding: 8px; margin: 0; font-size: 14px; background: #222; color: white;">
            <button onclick="sendChat()" style="width: 25%; padding: 8px; margin: 0; font-size: 14px; background-color: #55efc4; color: black;">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentTable = ""; 

        function createCardHTML(cardData) {
            let symbol = "", colorClass = "";
            if (cardData.suit === 'Hearts') { symbol = "♥"; colorClass = "red"; }
            if (cardData.suit === 'Diamonds') { symbol = "♦"; colorClass = "red"; }
            if (cardData.suit === 'Clubs') { symbol = "♣"; colorClass = "black"; }
            if (cardData.suit === 'Spades') { symbol = "♠"; colorClass = "black"; }
            return `<div class="card ${colorClass}" data-value="${cardData.value}">
                        <div>${cardData.value}</div>
                        <div style="font-size: 36px;">${symbol}</div>
                    </div>`;
        }

        function sitAtTable() {
            const username = document.getElementById('usernameInput').value;
            const betAmount = document.getElementById('betInput').value;
            const rawRoom = document.getElementById('roomInput').value;
            
            if (!username || !betAmount) return alert("Enter a username and bet!");
            currentTable = (rawRoom && rawRoom.trim() !== "") ? rawRoom.trim() : "Public-1";
            
            socket.emit('joinTable', { tableId: currentTable, username, betAmount });
            
            document.getElementById('status').innerText = `Playing as ${username} at ${currentTable}`;
            document.getElementById('chatRoomName').innerText = currentTable;
            document.getElementById('gameStatus').innerText = ""; 
            document.getElementById('dealerMessages').innerText = "Dealer waiting...";
            document.getElementById('dealerCards').innerHTML = ""; 
            document.getElementById('actionButtons').style.display = "none";
            document.getElementById('reactionBar').style.display = "inline-block"; 
        }

        function hit() { socket.emit('hit', currentTable); }
        function stand() { socket.emit('stand', currentTable); }

        socket.on('updateBalance', (bal) => document.getElementById('balanceDisplay').innerText = bal);

        socket.on('dealCards', (data) => {
            let cardsHTML = "";
            data.hand.forEach(c => cardsHTML += createCardHTML(c));
            document.getElementById('playerCards').innerHTML = cardsHTML;
            document.getElementById('scoreDisplay').innerText = `Your Score: ${data.score}`;
            document.getElementById('actionButtons').style.display = "block"; 
        });

        socket.on('dealerPlayed', (data) => {
            let cardsHTML = "";
            data.hand.forEach(c => cardsHTML += createCardHTML(c));
            document.getElementById('dealerCards').innerHTML = cardsHTML;
            document.getElementById('dealerMessages').innerText = `Dealer Score: ${data.score}`;
        });

        socket.on('gameStatus', (msg) => {
            const s = document.getElementById('gameStatus');
            s.innerText = msg;
            s.style.color = msg.includes("WIN") ? "#55efc4" : (msg.includes("BUST") || msg.includes("lose")) ? "#ff7675" : "#ffeaa7";
            document.getElementById('actionButtons').style.display = "none";
        });

        // --- UPDATED TABLE STATE (NOW INCLUDES TIPPING) ---
        socket.on('tableStateUpdate', (allPlayers) => {
            const otherPlayersDiv = document.getElementById('otherPlayers');
            const myUsername = document.getElementById('usernameInput').value;
            let otherPlayersHTML = "";

            allPlayers.forEach(player => {
                if (player.username !== myUsername) {
                    let miniCardsHTML = "";
                    player.hand.forEach(c => {
                        miniCardsHTML += `<div style="transform: scale(0.6); margin: -20px; display: inline-block;">${createCardHTML(c)}</div>`;
                    });
                    
                    // Added a Tip Button bound to the specific player
                    otherPlayersHTML += `
                        <div style="background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; border: 1px solid #55efc4;">
                            <h4 style="color: #f1c40f; margin: 0 0 10px 0;">👤 ${player.username}</h4>
                            <div style="display: flex; justify-content: center;">${miniCardsHTML}</div>
                            <p style="margin: 5px 0 0 0; font-size: 14px; color: #ccc;">Score: ${player.score}</p>
                            <button class="tip-btn" onclick="sendTip('${player.username}')">Tip ₹100</button>
                        </div>`;
                }
            });
            otherPlayersDiv.innerHTML = otherPlayersHTML;
        });

        // --- SOCIAL JAVASCRIPT LOGIC ---
        function sendTip(receiverUsername) {
            const myUsername = document.getElementById('usernameInput').value;
            if(confirm(`Send ₹100 tip to ${receiverUsername}?`)) {
                socket.emit('tipPlayer', { tableId: currentTable, sender: myUsername, receiver: receiverUsername, amount: 100 });
            }
        }

        function fireReaction(emoji) {
            const myUsername = document.getElementById('usernameInput').value;
            socket.emit('sendReaction', { tableId: currentTable, username: myUsername, emoji: emoji });
        }

        // Animate the emoji when received from the server
        socket.on('triggerReaction', (data) => {
            const table = document.getElementById('gameTable');
            const emojiEl = document.createElement('div');
            emojiEl.className = 'floating-emoji';
            emojiEl.innerText = data.emoji;
            
            // Randomize starting position slightly across the bottom of the table
            const randomLeft = Math.floor(Math.random() * 80) + 10; 
            emojiEl.style.left = `${randomLeft}%`;
            emojiEl.style.bottom = '100px';

            table.appendChild(emojiEl);
            
            // Cleanup the DOM element after animation ends
            setTimeout(() => { emojiEl.remove(); }, 2500);
        });

        // --- CHAT LOGIC ---
        function sendChat() {
            const input = document.getElementById('chatInput');
            const username = document.getElementById('usernameInput').value || "Anon";
            if (input.value.trim() !== "" && currentTable !== "") {
                socket.emit('sendChat', { tableId: currentTable, username, message: input.value });
                input.value = "";
            }
        }
        document.getElementById("chatInput").addEventListener("keypress", e => { if(e.key === "Enter") sendChat(); });

        socket.on('receiveChat', (data) => {
            const hist = document.getElementById('chatHistory');
            let color = data.username === "SYSTEM" ? "#ff7675" : "#f1c40f";
            hist.innerHTML += `<div><strong style="color: ${color};">${data.username}:</strong> ${data.message}</div>`;
            hist.scrollTop = hist.scrollHeight;
        });
    </script>
</body>
</html>
